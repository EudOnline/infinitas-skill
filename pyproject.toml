[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "infinitas-hosted-registry"
version = "0.1.0"
description = "Hosted control plane for the infinitas private skill registry"
requires-python = ">=3.11"
dependencies = [
  "alembic>=1.16,<2",
  "fastapi>=0.116,<1",
  "httpx>=0.28,<1",
  "jinja2>=3.1,<4",
  "sqlalchemy>=2.0,<3",
  "uvicorn>=0.35,<1",
]

[project.scripts]
infinitas = "infinitas_skill.cli.main:main"

[dependency-groups]
dev = [
  "pytest>=8,<9",
  "ruff>=0.11,<1",
]

[tool.setuptools.packages.find]
where = [".", "src"]
include = ["server*", "infinitas_skill*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"src/infinitas_skill/install/service.py" = ["E402"]
"src/infinitas_skill/policy/service.py" = ["E402"]
"src/infinitas_skill/release/service.py" = ["E402"]
