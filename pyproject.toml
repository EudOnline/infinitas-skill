[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "infinitas-hosted-registry"
version = "0.1.0"
description = "Hosted control plane for the infinitas private skill registry"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.116,<1",
  "httpx>=0.28,<1",
  "jinja2>=3.1,<4",
  "sqlalchemy>=2.0,<3",
  "uvicorn>=0.35,<1",
]

[tool.setuptools.packages.find]
include = ["server*"]
