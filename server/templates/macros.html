{#
  infinitas-skill reusable template macros
#}

{%- macro console_table_shell(title, empty_text, items, filterable=False) -%}
<section class="console-table-shell" data-reveal>
  <h3 class="font-display text-sm font-bold text-kawaii-ink mb-2">{{ title }}</h3>
  {% if filterable and items %}
  <input type="text" class="table-filter-input mb-2 w-full px-3 py-1.5 rounded-lg border border-kawaii-line bg-kawaii-panel text-base md:text-sm text-kawaii-ink focus:outline-none focus:ring-2 focus:ring-kawaii-primary/40" placeholder="{{ (ui['filter_placeholder'] if ui is defined else none) | default('Filter...') }}" aria-label="{{ (ui['filter_aria_label'] if ui is defined else none) | default('Filter table') }}" data-table-filter>
  {% endif %}
  <div class="overflow-x-auto -mx-4 px-4 table-scroll">
    {% if items %}
    {{ caller() }}
    {% else %}
    <p class="text-sm text-kawaii-ink-muted py-4 text-center">{{ empty_text }}</p>
    {% endif %}
  </div>
</section>
{%- endmacro -%}
