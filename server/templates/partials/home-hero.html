<section class="hero-section mb-4 md:mb-3.5 animate-in" id="start">
  <div class="p-4 sm:p-5 md:p-6 relative kawaii-card">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-5 md:gap-6 items-start">
      <div>
        <div class="hero-kicker">{{ page_eyebrow }}</div>

        <h1 class="hero-title">
          {{ hero_title }}
          {% if hero_emphasis %}
          <span class="hero-title-highlight">{{ hero_emphasis }}</span>
          {% endif %}
        </h1>

        <p class="text-base text-kawaii-ink-soft mb-4 sm:mb-5 leading-relaxed max-w-[26rem]">{{ hero_body }}</p>

        <button class="hero-cta min-h-[2.75rem] py-[0.6rem] px-[1.25rem] kawaii-button kawaii-button--primary" type="button" data-copy="{{ hero_primary_copy | forceescape }}">
          <svg class="w-4 h-4 inline -mt-0.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
          <span>{{ hero_primary_link.label }}</span>
        </button>
      </div>

      <div class="quick-start" id="handoff">
        <div class="quick-start-header">
          <span class="quick-start-title">{{ ui.quick_start_title }}</span>
        </div>

        <div class="quick-pills">
          {% for prompt in human_prompts[:3] %}
          <button class="quick-pill {{ 'quick-pill--primary' if loop.first }}" type="button" data-copy="{{ prompt.prompt | forceescape }}">
            {{ prompt.title }}
          </button>
          {% endfor %}
          {% for cmd in command_examples[:2] %}
          <button class="quick-pill quick-pill--code" type="button" data-copy="{{ cmd.command | forceescape }}">
            {{ cmd.title }}
          </button>
          {% endfor %}
        </div>

        <p class="quick-hint">{{ ui.quick_start_hint }}</p>
      </div>
    </div>
  </div>
</section>
