{% extends "layout-kawaii.html" %}
{% block body %}
<section class="kawaii-card animate-in">
  <div class="inline-block px-4 py-1.5 bg-kawaii-primary/20 dark:bg-kawaii-primary/30 rounded-full text-sm font-bold text-kawaii-ink-soft dark:text-kawaii-ink-soft mb-3">{{ ui['login_badge'] }}</div>
  <h2 class="font-display text-[clamp(1.5rem,3.5vw,2.2rem)] font-extrabold leading-tight text-kawaii-ink mb-2">{{ ui['login_title'] }}</h2>
  <p class="mt-2 text-kawaii-ink-soft">{{ ui['login_desc'] }}</p>
  
  <div class="login-panel" id="login-panel">
    <div class="flex items-center gap-2 mb-3">
      <span aria-hidden="true">🔑</span>
      <span>{{ ui['login_input_label'] }}</span>
    </div>
    
    <div>
      <div class="token-input-wrapper login-token-wrapper">
        <input type="password" id="token-input" class="token-input login-token-input" 
               placeholder="{{ ui['login_placeholder'] }}" 
               autocomplete="off" minlength="8" maxlength="128"
               aria-label="{{ ui['login_aria_label'] }}"/>
        <button type="button" class="token-toggle login-token-toggle" id="token-toggle" title="{{ ui['toggle_password_title'] }}" aria-label="{{ ui['toggle_password_visibility'] }}">
          <span aria-hidden="true">👁️</span>
        </button>
      </div>
      <p class="auth-hint text-xs text-kawaii-ink-muted mb-3"><span aria-hidden="true">💡</span> {{ ui['login_hint'] }}</p>
      <button class="kawaii-button kawaii-button--primary" id="login-btn" type="button">
        <span class="btn-icon" aria-hidden="true"><span aria-hidden="true">🔓</span></span>
        <span>{{ ui['login_button'] }}</span>
      </button>
    </div>
    
    <div class="auth-error flex items-center gap-2 p-3 bg-kawaii-danger/10 dark:bg-kawaii-danger/15 border border-kawaii-danger/30 dark:border-kawaii-danger/40 rounded-kawaii-md text-kawaii-danger text-sm mt-3" id="auth-error" role="alert" aria-live="polite" hidden>
      <span aria-hidden="true">❌</span>
      <span id="error-message">{{ ui['login_error'] }}</span>
    </div>
  </div>
</section>


{% endblock %}
