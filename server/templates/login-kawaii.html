{% extends "layout-kawaii.html" %}
{% block body %}
<section class="kawaii-card animate-in">
  <div class="inline-block px-4 py-1.5 bg-kawaii-primary/20 dark:bg-kawaii-primary/30 rounded-full text-sm font-bold text-kawaii-ink-soft dark:text-kawaii-ink-soft mb-3">{{ ui['login_badge'] }}</div>
  <h1 class="font-display text-[clamp(1.5rem,3.5vw,2.2rem)] font-extrabold leading-tight text-kawaii-ink mb-2">{{ ui['login_title'] }}</h1>
  <p class="mt-2 text-kawaii-ink-soft">{{ ui['login_desc'] }}</p>

  <div class="login-panel" id="login-panel">
    <form id="login-auth-form" action="/api/v1/auth/login" method="POST">
      <div class="flex flex-col gap-3 mt-4">
        <div>
          <label for="login-username-input" class="block text-sm font-medium text-kawaii-ink-soft mb-1">{{ ui['login_input_label'] }}</label>
          <input type="text" id="login-username-input" class="token-input login-token-input"
                 placeholder="{{ ui['login_placeholder'] }}"
                 autocomplete="username" minlength="1" maxlength="100"
                 required
            />
        </div>
        <div>
          <label for="login-password-input" class="block text-sm font-medium text-kawaii-ink-soft mb-1">{{ ui['login_password_label'] }}</label>
          <div class="token-input-wrapper login-token-wrapper">
            <input type="password" id="login-password-input" class="token-input login-token-input"
                   placeholder="{{ ui['login_password_placeholder'] }}"
                   autocomplete="current-password" minlength="8" maxlength="128"
                   required
              />
            <button type="button" class="token-toggle login-token-toggle" id="login-password-toggle" title="{{ ui['toggle_password_title'] }}" aria-label="{{ ui['toggle_password_visibility'] }}">
            </button>
          </div>
        </div>
      </div>
      <p class="auth-hint text-xs text-kawaii-ink-muted mt-2 mb-3">{{ ui['login_hint'] }}</p>
      <button class="kawaii-button kawaii-button--primary" id="login-login-btn" type="submit">
        <span class="btn-text">{{ ui['login_button'] }}</span>
      </button>
    </form>

    <div class="auth-error flex items-center gap-2 p-3 bg-kawaii-danger/10 dark:bg-kawaii-danger/15 border border-kawaii-danger/30 dark:border-kawaii-danger/40 rounded-kawaii-md text-kawaii-danger text-sm mt-3" id="login-auth-error" role="alert" aria-live="polite" hidden>
      <span id="login-error-message">{{ ui['login_error'] }}</span>
    </div>
  </div>
</section>


{% endblock %}
