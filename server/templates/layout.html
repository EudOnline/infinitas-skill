<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "infinitas hosted registry" }}</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
      }
      .card {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.25rem;
      }
      code {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>{{ title or "infinitas hosted registry" }}</h1>
        <p>{{ content or "" }}</p>
        {% block body %}{% endblock %}
      </div>
    </main>
  </body>
</html>
