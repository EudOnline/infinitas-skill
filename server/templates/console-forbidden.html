{% extends "layout-kawaii.html" %}

{% block body %}
<section class="kawaii-card animate-in">
  <div class="section-kicker">{{ '访问受限' if page_language == 'zh' else 'Access denied' }}</div>
  <h2 class="page-title" style="margin-top: 0.45rem;">{{ denied_title }}</h2>
  <p class="page-copy" style="max-width: 42rem; margin-top: 0.85rem;">{{ denied_body }}</p>
  <div style="margin-top: 1rem;">
    <a class="kawaii-button kawaii-button--primary" href="{{ denied_home_href }}">
      <span>🏠</span>
      <span>{{ denied_home_label }}</span>
    </a>
  </div>
</section>
{% endblock %}
