name: validate-registry

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check CI attestation workflow contract
        run: python3 scripts/test-ci-attestation-workflow.py

      - name: Install hosted registry test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install .
          python3 -m pip install "pytest>=8,<9" "ruff>=0.11,<1"

      - name: Run maintained fast gate
        run: make ci-fast

      - name: Run maintainability-aware closeout verification matrix
        env:
          INFINITAS_REQUIRE_HOSTED_E2E_TESTS: 1
          INFINITAS_REQUIRE_PRIVATE_REGISTRY_TESTS: 1
          INFINITAS_SKIP_BROWSER_RUNTIME_TESTS: 1
        run: scripts/check-all.sh
