name: validate-registry

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Check unit contracts
        run: .venv/bin/pytest tests/unit -q --override-ini=addopts=

      - name: Run maintained fast gate
        run: make ci-fast

      - name: Verify database and API contracts
        run: |
          .venv/bin/pytest tests/integration/test_alembic_metadata.py -q --override-ini=addopts=
          .venv/bin/python scripts/generate-openapi.py --check

      - name: Run maintainability-aware closeout verification matrix
        env:
          INFINITAS_REQUIRE_HOSTED_E2E_TESTS: 1
          INFINITAS_REQUIRE_PRIVATE_REGISTRY_TESTS: 1
          INFINITAS_SKIP_BROWSER_RUNTIME_TESTS: 1
        run: scripts/check-all.sh
