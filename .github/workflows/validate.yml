name: validate-registry

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python dependencies
        run: uv sync --all-groups --locked

      - name: Install Playwright Chromium
        run: .venv/bin/playwright install --with-deps chromium

      - name: Run maintainability-aware closeout verification matrix
        env:
          INFINITAS_REQUIRE_HOSTED_E2E_TESTS: 1
          INFINITAS_REQUIRE_PRIVATE_REGISTRY_TESTS: 1
          INFINITAS_SKIP_BROWSER_RUNTIME_TESTS: 1
        run: scripts/check-all.sh

  python-314-archive-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install locked Python dependencies
        run: uv sync --all-groups --locked

      - name: Verify archive extraction compatibility
        run: .venv/bin/pytest tests/unit/install/test_distribution_materialization.py -q --override-ini=addopts=

  build-container:
    needs: [validate, python-314-archive-preview]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local image for runtime smoke
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: infinitas-smoke:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test built image
        env:
          IMAGE: infinitas-smoke:${{ github.sha }}
        run: |
          set -euo pipefail
          docker run --detach --name infinitas-smoke --publish 18000:8000 \
            --env HOME=/tmp/infinitas/home \
            --env INFINITAS_SERVER_ENV=production \
            --env INFINITAS_SERVER_SECRET_KEY=Xn9pL2vQ4sT7wZ1aB3cD5eF7gH9jK1mN \
            --env 'INFINITAS_SERVER_ALLOWED_HOSTS=["127.0.0.1","localhost"]' \
            --env 'INFINITAS_SERVER_BOOTSTRAP_USERS=[{"username":"smoke","display_name":"Smoke","role":"maintainer","password":"SmokePassword123!","token":"smoke-agent-token"}]' \
            --env 'INFINITAS_REGISTRY_READ_TOKENS=[]' \
            --env INFINITAS_SERVER_REPO_PATH=/tmp/infinitas/repo \
            --env INFINITAS_SERVER_REPO_LOCK_PATH=/tmp/infinitas/data/repo.lock \
            --env INFINITAS_SERVER_ARTIFACT_PATH=/tmp/infinitas/artifacts \
            --env INFINITAS_SERVER_DATABASE_URL=sqlite:////tmp/infinitas/data/server.db \
            "$IMAGE"
          trap 'docker rm --force infinitas-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if docker exec infinitas-smoke python3 -c \
              "import urllib.request; urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8000/api/v1/system/healthz', headers={'Host':'127.0.0.1','X-Forwarded-Proto':'https'}), timeout=5)"; then
              exit 0
            fi
            sleep 2
          done
          docker logs infinitas-smoke
          exit 1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
