name: release-attestation

on:
  workflow_dispatch:
    inputs:
      skill:
        description: Skill name to attest
        required: true
        type: string
      version:
        description: Stable version to attest
        required: true
        type: string
      manifest_path:
        description: Repository-relative manifest path
        required: true
        type: string
  workflow_call:
    inputs:
      skill:
        required: true
        type: string
      version:
        required: true
        type: string
      manifest_path:
        required: true
        type: string

jobs:
  attest:
    runs-on: ubuntu-latest
    env:
      SKILL_NAME: ${{ inputs.skill || github.event.inputs.skill }}
      SKILL_VERSION: ${{ inputs.version || github.event.inputs.version }}
      MANIFEST_PATH: ${{ inputs.manifest_path || github.event.inputs.manifest_path }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_REF: ${{ github.ref }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      GITHUB_WORKFLOW: ${{ github.workflow }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Validate release inputs
        run: |
          test -n "$SKILL_NAME"
          test -n "$SKILL_VERSION"
          test -n "$MANIFEST_PATH"
          test -f "$MANIFEST_PATH"

      - name: Emit CI attestation sidecar
        run: |
          mkdir -p catalog/provenance
          .venv/bin/infinitas release generate-ci-attestation "$SKILL_NAME" \
            --output-name "$SKILL_NAME-$SKILL_VERSION.ci.json" \
            --distribution-manifest-path "$MANIFEST_PATH" \
            > "catalog/provenance/$SKILL_NAME-$SKILL_VERSION.ci.json"

      - name: Upload CI attestation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-attestation-${{ env.SKILL_NAME }}-${{ env.SKILL_VERSION }}
          path: catalog/provenance/${{ env.SKILL_NAME }}-${{ env.SKILL_VERSION }}.ci.json
